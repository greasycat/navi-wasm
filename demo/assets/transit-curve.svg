<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Transit light curve</title>
  <desc id="desc">Stylized exoplanet transit chart with a central dip and orbital motif.</desc>
  <defs>
